# Prevent the kernel from auto-binding agilent_82357a on USB hotplug.
#
# Why: the 82357B firmware may be in a power-on fault state at cold
# enumeration. gpib-hotplug.service runs gpib_cold_init first, then
# explicitly modprobes agilent_82357a after firmware recovery.
#
# "blacklist" blocks automatic loading via modules.alias. Explicit
# "modprobe agilent_82357a" is still honoured.
blacklist agilent_82357a
